name: Release

# 全视维 跨平台发布工作流。
# 推送 v* 标签时触发，在 Windows / Linux / macOS 上打包桌面版，
# 并尝试在 Ubuntu 上构建 Android APK。所有产物上传到对应 Release。
#
# 必需 secrets（可选，用于自动更新器签名）：
#   TAURI_SIGNING_PRIVATE_KEY
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
# Android 签名（可选，缺省时 CI 会生成临时 release keystore）：
#   ANDROID_KEY_BASE64         — base64(keystore.jks)
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#   ANDROID_KEYSTORE_PASSWORD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: 桌面 (${{ matrix.settings.platform }})
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.settings.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.settings.args, 'aarch64-apple-darwin') && 'aarch64-apple-darwin' || contains(matrix.settings.args, 'x86_64-apple-darwin') && 'x86_64-apple-darwin' || '' }}

      - name: Cache cargo registry & build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build deps
        if: matrix.settings.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app (sign + bundle)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "全视维 ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          releaseBody: |
            # 全视维 ${{ github.ref_name }}

            ## 各平台首次启动说明（重要，请先看）

            ### Windows
            **方式一：免安装绿色版（推荐）**
            - 下载 `Quanshiwei_0.1.0_x64_portable.zip`，**右键 → 属性 → 勾选"解除锁定"→ 确定**，再解压。
            - 双击解压目录里的 `Quanshiwei.exe` 即可运行，无需安装、无需管理员权限。
            - 首次运行如缺少 WebView2，会弹窗提示去微软官网下载（约 100MB）。

            **方式二：安装版**
            - 下载 `Quanshiwei_0.1.0_x64-setup.exe`，**右键 → 属性 → 勾选"解除锁定"→ 确定**。
            - SmartScreen 提示"未识别的应用" → 点 **更多信息 → 仍要运行**。
            - 当前为"仅当前用户"安装，无需管理员权限，装到 `%LocalAppData%\Programs\Quanshiwei`。
            - 安装后从开始菜单启动「Quanshiwei」。

            ### macOS（`*.dmg`）
            - 首次打开会提示"已损坏，无法打开" —— 这是 Apple Gatekeeper 对未签名应用的拦截，**不是真的损坏**。
            - 解决方案：终端执行
              ```bash
              xattr -cr /Applications/Quanshiwei.app
              ```
              再从启动台打开即可。

            ### Linux
            - **AppImage** 方式：
              ```bash
              chmod +x Quanshiwei_*_amd64.AppImage
              # Ubuntu 22.04+ 需先装 fuse2：
              sudo apt install libfuse2
              ./Quanshiwei_*_amd64.AppImage
              ```
            - **deb** 方式：
              ```bash
              sudo apt install ./Quanshiwei_*_amd64.deb
              # 启动：
              quanshiwei
              ```
              依赖 `libwebkit2gtk-4.1-0`，apt 会自动装。

            ### Android（`app-universal-*.apk`）
            - 若未配置正式 Android 发布密钥，CI 会自动生成一个临时 **release 签名**；仍需在系统设置允许"未知来源"才能安装。
            - 路径：设置 → 应用 → 特殊应用访问 → 安装未知应用 → 允许文件管理器/浏览器。

            ## 校验
            下载 `SHA256SUMS.txt` 后用 `sha256sum -c SHA256SUMS.txt`（Linux/macOS）或 `Get-FileHash`（Windows）验证完整性。
          args: ${{ matrix.settings.args }}

      - name: Package Windows portable zip
        if: matrix.settings.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/Quanshiwei.exe"
          if (-not (Test-Path $exe)) { $exe = (Get-ChildItem -Path src-tauri/target/release -Filter *.exe -File | Where-Object { $_.Name -notmatch 'setup|deps|build_script' } | Select-Object -First 1).FullName }
          if (-not $exe) { Write-Error "exe not found"; exit 1 }
          $stage = "dist-portable/Quanshiwei_0.1.0_x64_portable"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item $exe "$stage/Quanshiwei.exe" -Force
          if (Test-Path src-tauri/target/release/resources) { Copy-Item src-tauri/target/release/resources $stage -Recurse -Force }
          Set-Content -Path "$stage/README.txt" -Encoding UTF8 -Value "Quanshiwei 0.1.0 Portable`r`n`r`n直接双击 Quanshiwei.exe 启动。`r`n如提示缺少 WebView2，请先安装：`r`nhttps://developer.microsoft.com/microsoft-edge/webview2/"
          Compress-Archive -Path "$stage/*" -DestinationPath "dist-portable/Quanshiwei_0.1.0_x64_portable.zip" -Force
          Get-ChildItem dist-portable

      - name: Upload portable zip to Release
        if: matrix.settings.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist-portable/Quanshiwei_0.1.0_x64_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Android APK
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          # Only build for modern 64-bit ARM phones to keep the APK
          # small. >99% of in-market Android devices are arm64-v8a;
          # x86 / x86_64 are emulator-only and i686 is essentially
          # extinct. Each extra ABI roughly adds another full copy of
          # the Rust .so to the universal APK.
          targets: "aarch64-linux-android"

      - name: Cache cargo registry & build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Initialize Android project
        run: npx tauri android init

      - name: Inject Android runtime permissions
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if [ ! -f "$MANIFEST" ]; then
            echo "AndroidManifest.xml not found at $MANIFEST"; exit 1
          fi
          # Add RECORD_AUDIO so in-app MediaRecorder can capture mic.
          # Add READ_MEDIA_IMAGES / READ_MEDIA_AUDIO for picker access on Android 13+.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("src-tauri/gen/android/app/src/main/AndroidManifest.xml")
          s = p.read_text()
          perms = [
              '<uses-permission android:name="android.permission.RECORD_AUDIO" />',
              '<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />',
              '<uses-feature android:name="android.hardware.microphone" android:required="false" />',
          ]
          extra = "\n    " + "\n    ".join(p_ for p_ in perms if p_ not in s)
          s = re.sub(r"(<manifest[^>]*>)", r"\1" + extra, s, count=1)
          p.write_text(s)
          print(s)
          PY

      - name: Prepare Android signing key
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          mkdir -p src-tauri/gen/android
          if [ -n "$ANDROID_KEY_BASE64" ]; then
            echo "$ANDROID_KEY_BASE64" | base64 -d > src-tauri/gen/android/keystore.jks
            STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
            KEY_ALIAS="$ANDROID_KEY_ALIAS"
          else
            echo "No Android signing key provided; generating a temporary release keystore."
            STORE_PASSWORD="android"
            KEY_PASSWORD="android"
            KEY_ALIAS="upload"
            keytool -genkeypair \
              -keystore src-tauri/gen/android/keystore.jks \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -alias "$KEY_ALIAS" \
              -dname "CN=Quanshiwei, OU=CI, O=Quanshiwei, L=Shanghai, ST=Shanghai, C=CN" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 3650
          fi
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          # `--split-per-abi` produces per-architecture APKs instead of
          # a fat universal APK; combined with the single arm64 target
          # above this cuts download size by ~3-4x.
          # Always build the release variant so the packaged app is not
          # debuggable and will not launch into the system "Waiting For
          # Debugger" flow on end-user devices.
          npx tauri android build --apk --split-per-abi

      - name: Collect APK artifacts
        run: |
          mkdir -p dist-android
          find src-tauri/gen/android -name "*.apk" -exec cp {} dist-android/ \;
          ls -lh dist-android || true

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "全视维 ${{ github.ref_name }}"
          draft: true
          files: dist-android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: quanshiwei-android-apk
          path: dist-android/*.apk
          if-no-files-found: warn

  checksums:
    name: SHA256SUMS
    needs: [desktop, android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          # 列出该 tag 对应的 release 资源（含草稿）。
          gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json assets --jq '.assets[].name' > asset-names.txt || true
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            echo "Downloading $name"
            gh release download "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --pattern "$name" \
              --dir release-assets || true
          done < asset-names.txt
          ls -lh release-assets

      - name: Compute SHA256SUMS.txt
        working-directory: release-assets
        run: |
          if [ -z "$(ls -A . 2>/dev/null)" ]; then
            echo "no assets found, skipping"
            exit 0
          fi
          sha256sum * | sort -k2 > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt to Release
        if: hashFiles('SHA256SUMS.txt') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
